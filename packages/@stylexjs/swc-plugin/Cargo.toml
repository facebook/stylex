[package]
name = "stylex_swc_plugin_wasm"
edition = "2021"
license = "MIT"
version = "0.18.2"

[lib]
name = "stylex_swc_plugin"
crate-type = ["cdylib", "rlib"]

[dependencies]
anyhow = "1.0.98"
indexmap = "2.10.0"
regex = "1.11.1"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
idna = "=1.0.3"
idna_adapter = "=1.1.0"
swc_core = { version = "63.1.3", features = ["common", "ecma_ast", "ecma_codegen", "ecma_parser", "ecma_plugin_transform"] }
swc_common = "14.0.3"
swc_ecma_ast = "15.0.0"
swc_ecma_codegen = "17.0.2"
swc_ecma_parser = "24.0.1"
swc_ecma_visit = "15.0.0"
url = "=2.5.4"

[dev-dependencies]
pretty_assertions = "1.4.1"
